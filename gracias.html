<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mensaje enviado — Santa Carne</title>
  <meta name="robots" content="noindex, nofollow" />

  <link rel="icon" type="image/webp" href="img/logo.webp" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body {
      font-family: 'Montserrat', sans-serif;
      background-color: #0a0505;
      color: #fff;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;

      background-image: url('img/hero-fondo.webp');
      background-size: cover;
      background-position: center center;
    }
    .overlay {
      position: fixed;
      inset: 0;
      background: linear-gradient(160deg, rgba(10,5,5,0.82) 0%, rgba(80,20,20,0.65) 50%, rgba(10,5,5,0.75) 100%);
      z-index: 0;
    }
    .card {
      position: relative;
      z-index: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 3rem 2.5rem;
      max-width: 520px;
      width: 100%;
      text-align: center;
      backdrop-filter: blur(8px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }
    .icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, #983A3A 0%, #6b2020 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 20px rgba(152,58,58,0.45);
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
      margin-bottom: 0.5rem;
    }
    .logo img {
      width: 36px;
      height: 36px;
      object-fit: contain;
      border-radius: 6px;
    }
    .logo span {
      font-family: 'Lora', Georgia, serif;
      font-size: 1.2rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.02em;
    }
    h1 {
      font-family: 'Lora', Georgia, serif;
      font-size: clamp(1.5rem, 5vw, 2rem);
      font-weight: 700;
      color: #fff;
      line-height: 1.2;
    }
    p {
      font-size: 0.95rem;
      font-weight: 300;
      color: rgba(255,255,255,0.7);
      line-height: 1.7;
    }
    .divider {
      width: 48px;
      height: 2px;
      background: linear-gradient(135deg, #983A3A 0%, #6b2020 100%);
      border-radius: 2px;
    }
    .btn {
      display: inline-block;
      padding: 0.85rem 2rem;
      background: linear-gradient(135deg, #983A3A 0%, #6b2020 100%);
      color: #fff;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      border-radius: 6px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      text-decoration: none;
      transition: opacity 0.25s, transform 0.2s;
      box-shadow: 0 4px 20px rgba(152,58,58,0.4);
    }
    .btn:hover {
      opacity: 0.85;
      transform: translateY(-2px);
    }
    .wsp {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.85rem;
      font-weight: 400;
      color: #25D366;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .wsp:hover { opacity: 0.8; }
  </style>
</head>
<body>

  <div class="overlay" aria-hidden="true"></div>

  <div class="card">

    <a href="index.html" class="logo">
      <img src="img/logo.webp" alt="Santa Carne logo" />
      <span>Santa Carne</span>
    </a>

    <div class="divider"></div>

    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>

    <h1>¡Mensaje recibido!</h1>

    <p>Gracias por contactarnos. Nos comunicamos con vos en menos de <strong style="color:rgba(255,255,255,0.9)">24 horas hábiles</strong> para coordinar la inspección.</p>

    <p>Si necesitás una respuesta urgente, podés escribirnos directamente por WhatsApp.</p>

    <a href="index.html" class="btn">Volver al inicio</a>

  </div>

</body>
</html>
